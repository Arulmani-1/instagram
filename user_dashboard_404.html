<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - STACKLY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user_dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/404.css">
    <script src="js/loader.js"></script>
</head>

<body style="background: #050906 !important;">
    <!-- Ambient lights removed -->





        <!-- Main Dashboard Content -->
        <main style="display: flex; align-items: center; justify-content: center; height: 100vh; width: 100%; margin: 0; padding: 0;">
            <section class="error-section" style="min-height: 100vh; width: 100%; padding: 0; background: #050906 !important;">
                <!-- Particles removed -->

                <div class="container" style="max-width: 800px; margin: 0 auto; text-align: center;">
                    <div class="error-content fade-in" style="padding-top: 50px;">
                        <div class="glitch-wrapper">
                            <h1 class="error-code" style="font-size: clamp(6rem, 15vw, 10rem);">404</h1>
                        </div>
                        <h2 class="error-title" style="font-size: 2rem;">PAGE NOT FOUND</h2>
                        <p class="error-message" style="font-size: 1rem; max-width: 500px;">You've ventured into uncharted territory. The page you're looking for doesn't exist or has been moved to another dimension.</p>
                        
                        <div class="error-actions">
                            <a href="#" onclick="history.back(); return false;" class="btn-404-outline">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> GO BACK
                            </a>
                            <a href="user_dashboard.html" class="btn-404-solid">
                                GO TO DASHBOARD <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-left: 8px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </main>

    <!-- No standard footer on dashboard -->

    <script src="js/script.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50 });

        // Load user info on dashboard load
        window.onload = function() {
            const name = localStorage.getItem('userName');
            const email = localStorage.getItem('userEmail');
            
            if (name) {
                const welcomeEl = document.getElementById('welcomeName');
                if(welcomeEl) welcomeEl.innerText = name;
            } else {
                const welcomeEl = document.getElementById('welcomeName');
                if(welcomeEl) welcomeEl.innerText = 'User';
            }
            
            if (email) {
                document.getElementById('displayEmail').innerText = email;
            }
        };

        // Logout function
        function handleLogout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
